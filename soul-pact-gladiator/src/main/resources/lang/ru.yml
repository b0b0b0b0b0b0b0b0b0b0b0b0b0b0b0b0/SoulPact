gladiator:
  startup:
    separator: "=============================="
    registered: "Модуль гладиаторских ивентов запущен. Арен: {count}"
    core-missing: "Ядро SoulPact не найдено — модуль отключён"
    database-missing: "База данных SoulPact не готова — модуль отключён"
  time:
    now: "сейчас"
    days: "д"
    hours: "ч"
    minutes: "м"
    seconds: "с"
  place:
    yes: "Да"
    no: "Нет"
    none: "—"
    enabled: "включена"
    disabled: "выключена"
  state:
    idle: "Ожидание"
    lobby: "Лобби"
    running: "Идёт бой"
    disabled: "Выключена"
  bossbar:
    lobby: "<gold>⚔ Гладиатор: <yellow>{arena}</yellow> — старт через <red>{seconds}с</red> | Бойцов: <aqua>{players}</aqua> | Кланов: <aqua>{clans}</aqua>"
    fight: "<red>⚔ Бой на арене <yellow>{arena}</yellow> | Бойцов: <aqua>{players}</aqua> | Кланов: <aqua>{clans}</aqua>"
  broadcast:
    lobby-open: "<gold>⚔ <yellow>Гладиаторский ивент!</yellow> Арена <aqua>{arena}</aqua> открыта — бой начнётся через <red>{seconds}с</red>. Вступайте: <white>/gladiator join {arena}</white>"
    fight-started: "<red>⚔ Бой на арене <yellow>{arena}</yellow> начался! Бойцов: <aqua>{players}</aqua>, кланов: <aqua>{clans}</aqua>"
    cancelled: "<gray>⚔ Ивент на арене <yellow>{arena}</yellow> отменён — недостаточно кланов (минимум {min})"
    stopped: "<gray>⚔ Ивент на арене <yellow>{arena}</yellow> остановлен"
    won: "<gold>⚔ Клан <aqua>{tag}</aqua> победил на арене <yellow>{arena}</yellow>!"
  event:
    joined: "<green>+ <white>{player}</white> <gray>[{tag}]</gray> вступил в бой на арене <yellow>{arena}</yellow>"
    eliminated: "<red>✖ <white>{player}</white> <gray>[{tag}]</gray> выбыл с арены <yellow>{arena}</yellow>"
    you-joined: "<green>Вы вступили в гладиаторский ивент на арене <yellow>{arena}</yellow>"
    you-left: "<gray>Вы покинули гладиаторский ивент"
    you-watching: "<aqua>Вы наблюдаете за ареной <yellow>{arena}</yellow>"
  error:
    players-only: "<red>Команда доступна только игрокам"
    no-permission: "<red>Недостаточно прав"
    no-event: "<red>На этой арене сейчас нет ивента"
    fight-started: "<red>Бой уже начался — присоединиться нельзя"
    already-joined: "<red>Вы уже участвуете в этом ивенте"
    not-in-clan: "<red>Для участия нужно состоять в клане"
    not-in-event: "<red>Вы не участвуете в ивенте"
    no-watch-point: "<red>У арены не задана точка наблюдения"
    arena-exists: "<red>Арена <yellow>{arena}</yellow> уже существует"
    unknown-arena: "<red>Арена <yellow>{arena}</yellow> не найдена"
    unknown-material: "<red>Неизвестный материал: {material}"
    unknown-schedule: "<red>Расписание #{id} не найдено"
    arena-disabled: "<red>Арена <yellow>{arena}</yellow> выключена"
    missing-points: "<red>У арены <yellow>{arena}</yellow> не заданы точки SPAWN, LOBBY и EXIT"
    already-running: "<red>Ивент на арене <yellow>{arena}</yellow> уже идёт"
  usage:
    join: "<gray>Использование: <white>/gladiator join <арена>"
    watch: "<gray>Использование: <white>/gladiator watch <арена>"
    arena: "<gray>Использование: <white>/clanglad arena <create|delete|list|point|toggle|seticon|settag|desc> ..."
    arena-point: "<gray>Использование: <white>/clanglad arena point <арена> <SPAWN|WATCH|EXIT|LOBBY>"
    arena-seticon: "<gray>Использование: <white>/clanglad arena seticon <арена> <материал>"
    arena-settag: "<gray>Использование: <white>/clanglad arena settag <арена> <тег>"
    arena-desc: "<gray>Использование: <white>/clanglad arena desc <арена> <описание>"
    reward: "<gray>Использование: <white>/clanglad reward <list|clean|add> <арена> ..."
    reward-add: "<gray>Использование: <white>/clanglad reward add <арена> <команда>"
    scheduler: "<gray>Использование: <white>/clanglad scheduler <list|remove|create> <арена> ..."
    scheduler-remove: "<gray>Использование: <white>/clanglad scheduler remove <арена> <id>"
    scheduler-create: "<gray>Использование: <white>/clanglad scheduler create <арена> <DAILY|WEEKLY> <день 1-7> <час:минута>"
    start: "<gray>Использование: <white>/clanglad start <арена>"
    stop: "<gray>Использование: <white>/clanglad stop <арена>"
    view: "<gray>Использование: <white>/clanglad view <арена>"
  admin:
    arena-created: "<green>Арена <yellow>{arena}</yellow> создана"
    arena-deleted: "<green>Арена <yellow>{arena}</yellow> удалена"
    arena-list-header: "<gold>Арены ({count}):"
    arena-list-line: "<gray>• <yellow>{arena}</yellow> — {state}, тег: <aqua>{tag}</aqua>"
    region-applied: "<green>Регион из выделения применён к арене <yellow>{arena}</yellow>"
    point-set: "<green>Точка <aqua>{point}</aqua> арены <yellow>{arena}</yellow> установлена"
    arena-toggled: "<green>Арена <yellow>{arena}</yellow> теперь {state}"
    icon-set: "<green>Иконка арены <yellow>{arena}</yellow>: <aqua>{material}</aqua>"
    tag-set: "<green>Тег арены <yellow>{arena}</yellow>: {tag}"
    desc-set: "<green>Описание арены <yellow>{arena}</yellow> обновлено"
    reward-list-header: "<gold>Награды арены <yellow>{arena}</yellow> ({count}):"
    reward-list-line: "<gray>{index}. <white>{command}"
    reward-cleared: "<green>Награды арены <yellow>{arena}</yellow> очищены"
    reward-added: "<green>Награда добавлена арене <yellow>{arena}</yellow>: <white>{command}"
    scheduler-list-header: "<gold>Расписания арены <yellow>{arena}</yellow> ({count}):"
    scheduler-list-line: "<gray>#{id} <white>{type}</white> день <aqua>{day}</aqua> в <aqua>{time}</aqua>"
    scheduler-removed: "<green>Расписание #{id} арены <yellow>{arena}</yellow> удалено"
    scheduler-created: "<green>Расписание для <yellow>{arena}</yellow>: {type}, день {day}, {time}"
    reloaded: "<green>Настройки модуля перезагружены"
    wand-given: "<green>Жезл выдан. ЛКМ — первая точка, ПКМ — вторая точка региона арены"
    viewing: "<aqua>Вы телепортированы к арене <yellow>{arena}</yellow>"
    started: "<green>Ивент на арене <yellow>{arena}</yellow> запущен"
    stopped: "<green>Ивент на арене <yellow>{arena}</yellow> остановлен"
  wand:
    first: "<green>Первая точка: <aqua>{x} {y} {z}</aqua>"
    second: "<green>Вторая точка: <aqua>{x} {y} {z}</aqua>"
  help:
    player:
      - "<gold>⚔ Гладиаторский ивент:"
      - "<yellow>/gladiator <gray>— меню арен"
      - "<yellow>/gladiator help <gray>— эта справка"
      - "<yellow>/gladiator join <арена> <gray>— вступить в ивент"
      - "<yellow>/gladiator leave <gray>— покинуть ивент"
      - "<yellow>/gladiator watch <арена> <gray>— наблюдать за ивентом"
    admin:
      - "<gold>⚔ Администрирование гладиаторских ивентов:"
      - "<yellow>/clanglad reload <gray>— перезагрузить настройки"
      - "<yellow>/clanglad wand <gray>— жезл выделения региона"
      - "<yellow>/clanglad arena create|delete|list|toggle <арена> <gray>— управление аренами"
      - "<yellow>/clanglad arena point <арена> <SPAWN|WATCH|EXIT|LOBBY> <gray>— точки арены"
      - "<yellow>/clanglad arena seticon|settag|desc <арена> <значение> <gray>— оформление"
      - "<yellow>/clanglad reward list|clean|add <арена> (команда) <gray>— награды"
      - "<yellow>/clanglad start|stop|view <арена> <gray>— управление ивентом"
      - "<yellow>/clanglad scheduler list|remove|create <арена> ... <gray>— расписания"
  gui:
    title: "<dark_gray>⚔ Гладиаторские арены"
    no-description: "<gray>Без описания"
    action:
      join: "<green>▶ ЛКМ — вступить в бой"
      watch: "<aqua>▶ ПКМ — наблюдать"
    item:
      arena:
        name: "<gold>⚔ {arena}"
        lore:
          - "<gray>{description}"
          - ""
          - "<gray>Статус: <white>{state}"
          - "<gray>Тег арены: <white>{tag}"
          - "<gray>Владелец тега: <aqua>{holder}"
          - "<gray>Бойцов: <white>{players} <gray>| Кланов: <white>{clans}"
      back:
        name: "<yellow>← Назад"
        lore:
          - "<gray>Вернуться в меню клана"
