gladiator:
  startup:
    separator: "=============================="
    registered: "Gladiator events module started. Arenas: {count}"
    core-missing: "SoulPact core not found — module disabled"
    database-missing: "SoulPact database is not ready — module disabled"
  time:
    now: "now"
    days: "d"
    hours: "h"
    minutes: "m"
    seconds: "s"
  place:
    yes: "Yes"
    no: "No"
    none: "—"
    enabled: "enabled"
    disabled: "disabled"
  state:
    idle: "Idle"
    lobby: "Lobby"
    running: "Fighting"
    disabled: "Disabled"
  bossbar:
    lobby: "<gold>⚔ Gladiator: <yellow>{arena}</yellow> — starts in <red>{seconds}s</red> | Fighters: <aqua>{players}</aqua> | Clans: <aqua>{clans}</aqua>"
    fight: "<red>⚔ Fight at <yellow>{arena}</yellow> | Fighters: <aqua>{players}</aqua> | Clans: <aqua>{clans}</aqua>"
  broadcast:
    lobby-open: "<gold>⚔ <yellow>Gladiator event!</yellow> Arena <aqua>{arena}</aqua> is open — the fight starts in <red>{seconds}s</red>. Join: <white>/gladiator join {arena}</white>"
    fight-started: "<red>⚔ The fight at <yellow>{arena}</yellow> has begun! Fighters: <aqua>{players}</aqua>, clans: <aqua>{clans}</aqua>"
    cancelled: "<gray>⚔ Event at <yellow>{arena}</yellow> cancelled — not enough clans (minimum {min})"
    stopped: "<gray>⚔ Event at <yellow>{arena}</yellow> has been stopped"
    won: "<gold>⚔ Clan <aqua>{tag}</aqua> won the event at <yellow>{arena}</yellow>!"
  event:
    joined: "<green>+ <white>{player}</white> <gray>[{tag}]</gray> joined the fight at <yellow>{arena}</yellow>"
    eliminated: "<red>✖ <white>{player}</white> <gray>[{tag}]</gray> was eliminated at <yellow>{arena}</yellow>"
    you-joined: "<green>You joined the gladiator event at <yellow>{arena}</yellow>"
    you-left: "<gray>You left the gladiator event"
    you-watching: "<aqua>You are watching arena <yellow>{arena}</yellow>"
  error:
    players-only: "<red>This command is for players only"
    no-permission: "<red>You do not have permission"
    no-event: "<red>There is no event at this arena right now"
    fight-started: "<red>The fight has already started — you cannot join"
    already-joined: "<red>You are already in this event"
    not-in-clan: "<red>You must be in a clan to participate"
    not-in-event: "<red>You are not in an event"
    no-watch-point: "<red>The arena has no watch point set"
    arena-exists: "<red>Arena <yellow>{arena}</yellow> already exists"
    unknown-arena: "<red>Arena <yellow>{arena}</yellow> not found"
    unknown-material: "<red>Unknown material: {material}"
    unknown-schedule: "<red>Schedule #{id} not found"
    arena-disabled: "<red>Arena <yellow>{arena}</yellow> is disabled"
    missing-points: "<red>Arena <yellow>{arena}</yellow> is missing SPAWN, LOBBY and EXIT points"
    already-running: "<red>An event at <yellow>{arena}</yellow> is already running"
  usage:
    join: "<gray>Usage: <white>/gladiator join <arena>"
    watch: "<gray>Usage: <white>/gladiator watch <arena>"
    arena: "<gray>Usage: <white>/clanglad arena <create|delete|list|point|toggle|seticon|settag|desc> ..."
    arena-point: "<gray>Usage: <white>/clanglad arena point <arena> <SPAWN|WATCH|EXIT|LOBBY>"
    arena-seticon: "<gray>Usage: <white>/clanglad arena seticon <arena> <material>"
    arena-settag: "<gray>Usage: <white>/clanglad arena settag <arena> <tag>"
    arena-desc: "<gray>Usage: <white>/clanglad arena desc <arena> <description>"
    reward: "<gray>Usage: <white>/clanglad reward <list|clean|add> <arena> ..."
    reward-add: "<gray>Usage: <white>/clanglad reward add <arena> <command>"
    scheduler: "<gray>Usage: <white>/clanglad scheduler <list|remove|create> <arena> ..."
    scheduler-remove: "<gray>Usage: <white>/clanglad scheduler remove <arena> <id>"
    scheduler-create: "<gray>Usage: <white>/clanglad scheduler create <arena> <DAILY|WEEKLY> <day 1-7> <hour:minute>"
    start: "<gray>Usage: <white>/clanglad start <arena>"
    stop: "<gray>Usage: <white>/clanglad stop <arena>"
    view: "<gray>Usage: <white>/clanglad view <arena>"
  admin:
    arena-created: "<green>Arena <yellow>{arena}</yellow> created"
    arena-deleted: "<green>Arena <yellow>{arena}</yellow> deleted"
    arena-list-header: "<gold>Arenas ({count}):"
    arena-list-line: "<gray>• <yellow>{arena}</yellow> — {state}, tag: <aqua>{tag}</aqua>"
    region-applied: "<green>Selected region applied to arena <yellow>{arena}</yellow>"
    point-set: "<green>Point <aqua>{point}</aqua> of arena <yellow>{arena}</yellow> set"
    arena-toggled: "<green>Arena <yellow>{arena}</yellow> is now {state}"
    icon-set: "<green>Arena <yellow>{arena}</yellow> icon: <aqua>{material}</aqua>"
    tag-set: "<green>Arena <yellow>{arena}</yellow> tag: {tag}"
    desc-set: "<green>Arena <yellow>{arena}</yellow> description updated"
    reward-list-header: "<gold>Rewards of arena <yellow>{arena}</yellow> ({count}):"
    reward-list-line: "<gray>{index}. <white>{command}"
    reward-cleared: "<green>Rewards of arena <yellow>{arena}</yellow> cleared"
    reward-added: "<green>Reward added to arena <yellow>{arena}</yellow>: <white>{command}"
    scheduler-list-header: "<gold>Schedules of arena <yellow>{arena}</yellow> ({count}):"
    scheduler-list-line: "<gray>#{id} <white>{type}</white> day <aqua>{day}</aqua> at <aqua>{time}</aqua>"
    scheduler-removed: "<green>Schedule #{id} of arena <yellow>{arena}</yellow> removed"
    scheduler-created: "<green>Schedule for <yellow>{arena}</yellow>: {type}, day {day}, {time}"
    reloaded: "<green>Module settings reloaded"
    wand-given: "<green>Wand given. Left click — first point, right click — second point of the arena region"
    viewing: "<aqua>You were teleported to arena <yellow>{arena}</yellow>"
    started: "<green>Event at <yellow>{arena}</yellow> started"
    stopped: "<green>Event at <yellow>{arena}</yellow> stopped"
  wand:
    first: "<green>First point: <aqua>{x} {y} {z}</aqua>"
    second: "<green>Second point: <aqua>{x} {y} {z}</aqua>"
  help:
    player:
      - "<gold>⚔ Gladiator event:"
      - "<yellow>/gladiator <gray>— arenas menu"
      - "<yellow>/gladiator help <gray>— this help"
      - "<yellow>/gladiator join <arena> <gray>— join an event"
      - "<yellow>/gladiator leave <gray>— leave the event"
      - "<yellow>/gladiator watch <arena> <gray>— watch the event"
    admin:
      - "<gold>⚔ Gladiator events administration:"
      - "<yellow>/clanglad reload <gray>— reload settings"
      - "<yellow>/clanglad wand <gray>— region selection wand"
      - "<yellow>/clanglad arena create|delete|list|toggle <arena> <gray>— arena management"
      - "<yellow>/clanglad arena point <arena> <SPAWN|WATCH|EXIT|LOBBY> <gray>— arena points"
      - "<yellow>/clanglad arena seticon|settag|desc <arena> <value> <gray>— appearance"
      - "<yellow>/clanglad reward list|clean|add <arena> (command) <gray>— rewards"
      - "<yellow>/clanglad start|stop|view <arena> <gray>— event control"
      - "<yellow>/clanglad scheduler list|remove|create <arena> ... <gray>— schedules"
  gui:
    title: "<dark_gray>⚔ Gladiator arenas"
    no-description: "<gray>No description"
    action:
      join: "<green>▶ Left click — join the fight"
      watch: "<aqua>▶ Right click — watch"
    item:
      arena:
        name: "<gold>⚔ {arena}"
        lore:
          - "<gray>{description}"
          - ""
          - "<gray>State: <white>{state}"
          - "<gray>Arena tag: <white>{tag}"
          - "<gray>Tag holder: <aqua>{holder}"
          - "<gray>Fighters: <white>{players} <gray>| Clans: <white>{clans}"
      back:
        name: "<yellow>← Back"
        lore:
          - "<gray>Return to clan menu"
