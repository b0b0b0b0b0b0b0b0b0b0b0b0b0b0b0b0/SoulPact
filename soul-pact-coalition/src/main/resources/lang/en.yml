    invite-usage: "<#9CA3AF>/clancoalition invite <tag>"
    accept-usage: "<#9CA3AF>/clancoalition accept <id>"
    deny-usage: "<#9CA3AF>/clancoalition deny <id>"
    block-usage: "<#9CA3AF>/clancoalition block <id>"
