    ally-victory: "<#86EFAC>Allies won! <white>[{winner_tag}]</white> defeated <white>[{loser_tag}]</white>."
    ally-defeat: "<#F87171>Ally <white>[{loser_tag}]</white> lost the war."
    withdrawn: "<#EAB308>Coalition withdrew from the war because of clan <white>[{clan_tag}]</white>."
