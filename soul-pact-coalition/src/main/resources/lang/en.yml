    inviter-accepted-member: "<#86EFAC>Clan <white>[{target_tag}]</white> accepted the coalition invite."
    inviter-denied: "<#9CA3AF>Clan <white>[{target_tag}] {target_name}</white> denied your coalition invite."
    inviter-denied-member: "<#9CA3AF>Clan <white>[{target_tag}]</white> denied the coalition invite."
    inviter-blocked: "<#F87171>Clan <white>[{target_tag}] {target_name}</white> denied and blocked future invites."
    inviter-blocked-member: "<#F87171>Clan <white>[{target_tag}]</white> blocked your coalition invites."
    button:
      accept: "<#86EFAC><bold>[Accept]</bold>"
      deny: "<#F87171><bold>[Deny]</bold>"
      block: "<#6B7280><bold>[Block]</bold>"
